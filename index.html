<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GlowNatural Brightening Body Wash</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f8fb;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .product-container {
    background-color: #fff;
    border-radius: 10px;
    box-shadow: 0 2px 10px rgb(0 0 0 / 0.1);
    width: 350px;
    padding: 20px;
    text-align: center;
  }
  .product-image {
    width: 150px;
    margin-bottom: 20px;
  }
  h1 {
    color: #1e2a78;
    font-size: 24px;
    margin-bottom: 5px;
  }
  h2 {
    color: #444;
    font-weight: normal;
    font-size: 18px;
    margin-top: 0;
    margin-bottom: 15px;
  }
  .formula {
    background-color: #344eb1;
    color: white;
    padding: 5px 10px;
    border-radius: 15px;
    display: inline-block;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .ingredients {
    font-size: 14px;
    color: #555;
    margin-bottom: 15px;
    line-height: 1.5;
  }
  .vitamins {
    margin-bottom: 15px;
  }
  .vitamins .blue, .vitamins .green {
    font-weight: bold;
    padding: 5px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-right: 10px;
    color: white;
  }
  .vitamins .blue {
    background-color: #2056b2;
  }
  .vitamins .green {
    background-color: #79bf3f;
  }
  .paraben-free {
    background-color: #344eb1;
    color: white;
    display: inline-block;
    padding: 6px 15px;
    font-weight: bold;
    border-radius: 15px;
    margin-bottom: 20px;
  }
  .volume {
    font-size: 14px;
    color: #777;
  }
</style>
</head>
<body>
  <div class="product-container">
    <img 
      src="glow.jpg" 
      alt="GlowNatural Brightening Body Wash" 
      class="product-image" 
    />
    <h1>GlowNatural</h1>
    <h2>Brightening Body Wash</h2>
    <div class="formula">Glow-Enhancing Formula</div>
    <div class="ingredients">
      <p>Hyaluronic Acid | Niacinamide | Vitamin C | Alpha Arbutin</p>
    </div>
    <div class="vitamins">
      <span class="blue">Vitamin B5</span>
      <span class="green">Vitamin C</span>
    </div>
    <div class="paraben-free">Paraben-Free</div>
    <div class="volume">250ml</div>
  </div>
</body>
</html>
